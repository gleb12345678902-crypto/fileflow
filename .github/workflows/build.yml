name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create www directory
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Remove existing android folder
        run: rm -rf android

      - name: Capacitor add Android
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Copy icons
        run: |
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$size
            cp public/icons/files.png android/app/src/main/res/mipmap-$size/ic_launcher.png
            cp public/icons/files.png android/app/src/main/res/mipmap-$size/ic_launcher_round.png
          done

      - name: Patch AndroidManifest for file intents
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          INTENT='        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:mimeType="application/pdf" />\n            <data android:mimeType="text/plain" />\n            <data android:mimeType="image/*" />\n            <data android:mimeType="application/vnd.openxmlformats-officedocument.wordprocessingml.document" />\n            <data android:mimeType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />\n            <data android:mimeType="application/vnd.openxmlformats-officedocument.presentationml.presentation" />\n        </intent-filter>'
          sed -i "/<\/activity>/i\\$INTENT" $MANIFEST

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fileflow-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk