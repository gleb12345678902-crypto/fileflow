<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FileFlow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #24243a;
      --accent: #7c6aff;
      --accent2: #a78bfa;
      --text: #f0f0f5;
      --text2: #9090aa;
      --danger: #ff6b6b;
      --radius: 16px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* HEADER */
    .header {
      background: var(--surface);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--surface2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 20px; font-weight: 700; color: var(--accent2); flex: 1; }
    .btn-open {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-open:active { opacity: 0.8; }

    /* SEARCH */
    .search-bar {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--surface2);
    }
    .search-bar input {
      width: 100%;
      background: var(--surface2);
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .search-bar input::placeholder { color: var(--text2); }

    /* TABS */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      background: var(--surface);
      border-bottom: 1px solid var(--surface2);
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      background: var(--surface2);
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: #fff; }

    /* FILE LIST */
    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60vh; gap: 16px; color: var(--text2);
      text-align: center;
    }
    .empty-icon { font-size: 64px; }
    .empty-state p { font-size: 16px; }
    .empty-state span { font-size: 13px; }

    .file-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: background 0.15s;
      border: 1px solid transparent;
    }
    .file-card:active { background: var(--surface2); border-color: var(--accent); }
    .file-icon { font-size: 36px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .file-delete {
      background: none; border: none; color: var(--text2);
      font-size: 20px; cursor: pointer; padding: 4px 8px;
      border-radius: 8px;
    }
    .file-delete:active { color: var(--danger); background: rgba(255,107,107,0.1); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="header-title">📁 FileFlow</span>
    <button class="btn-open" onclick="openFilePicker()">+ Открыть</button>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Поиск по названию..." oninput="renderList()">
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all', this)">Все</button>
    <button class="tab" onclick="setTab('pdf', this)">PDF</button>
    <button class="tab" onclick="setTab('doc', this)">Документы</button>
    <button class="tab" onclick="setTab('sheet', this)">Таблицы</button>
    <button class="tab" onclick="setTab('image', this)">Фото</button>
    <button class="tab" onclick="setTab('other', this)">Другое</button>
  </div>

  <div class="file-list" id="fileList"></div>
</div>

<!-- VIEWER MODAL -->
<div id="viewerModal" style="
  display:none; position:fixed; inset:0; z-index:1000;
  background:var(--bg); flex-direction:column;
">
  <div style="
    background:var(--surface); padding:14px 16px;
    display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--surface2);
  ">
    <button onclick="closeViewer()" style="
      background:none; border:none; color:var(--accent2);
      font-size:24px; cursor:pointer;
    ">←</button>
    <span id="viewerTitle" style="
      flex:1; font-size:15px; font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    "></span>
  </div>
  <div id="viewerContent" style="
    flex:1; overflow:auto; padding:16px;
  "></div>
</div>

<!-- HIDDEN INPUT -->
<input type="file" id="fileInput" style="display:none"
  accept=".pdf,.txt,.docx,.xlsx,.xls,.csv,.pptx,.jpg,.jpeg,.png,.gif,.webp,.svg,.bmp"
  onchange="handleFileInput(event)">
<script>
  // STATE
  let files = JSON.parse(localStorage.getItem('fileflow_files') || '[]');
  let currentTab = 'all';

  // FILE CATEGORIES
  const categories = {
    pdf: ['pdf'],
    doc: ['txt', 'docx'],
    sheet: ['xlsx', 'xls', 'csv'],
    image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'],
    other: ['pptx']
  };

  const icons = {
    pdf: '📕', txt: '📝', docx: '📄', xlsx: '📊', xls: '📊',
    csv: '📊', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️',
    webp: '🖼️', svg: '🖼️', bmp: '🖼️', pptx: '📊'
  };

  function getExt(name) {
    return name.split('.').pop().toLowerCase();
  }

  function getCategory(name) {
    const ext = getExt(name);
    for (const [cat, exts] of Object.entries(categories)) {
      if (exts.includes(ext)) return cat;
    }
    return 'other';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
    return (bytes / 1024 / 1024).toFixed(1) + ' МБ';
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });
  }

  // TABS
  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  // RENDER
  function renderList() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const list = document.getElementById('fileList');

    let filtered = files.filter(f => {
      const matchTab = currentTab === 'all' || getCategory(f.name) === currentTab;
      const matchSearch = !query || f.name.toLowerCase().includes(query);
      return matchTab && matchSearch;
    });

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <p>Файлов пока нет</p>
          <span>Нажмите «+ Открыть» чтобы добавить файл</span>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map((f, i) => `
      <div class="file-card" onclick="openFile(${files.indexOf(f)})">
        <div class="file-icon">${icons[getExt(f.name)] || '📄'}</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${formatSize(f.size)} · ${formatDate(f.date)}</div>
        </div>
        <button class="file-delete" onclick="deleteFile(event, ${files.indexOf(f)})">🗑</button>
      </div>
    `).join('');
  }

  // SAVE
  function saveFiles() {
    // Сохраняем только метаданные, не содержимое
    const meta = files.map(f => ({
      name: f.name, size: f.size, date: f.date, dataKey: f.dataKey
    }));
    localStorage.setItem('fileflow_files', JSON.stringify(meta));
  }

  // DELETE
  function deleteFile(e, i) {
    e.stopPropagation();
    localStorage.removeItem('filedata_' + files[i].dataKey);
    files.splice(i, 1);
    saveFiles();
    renderList();
  }

  // OPEN FILE PICKER
  function openFilePicker() {
    document.getElementById('fileInput').click();
  }

  // HANDLE FILE INPUT
  function handleFileInput(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataKey = Date.now() + '_' + Math.random().toString(36).slice(2);
      try {
        localStorage.setItem('filedata_' + dataKey, ev.target.result);
      } catch(err) {
        alert('Файл слишком большой для сохранения в истории. Он будет открыт, но не сохранён.');
      }
      const fileObj = {
        name: file.name,
        size: file.size,
        date: Date.now(),
        dataKey: dataKey,
        data: ev.target.result
      };
      // Убираем дубликаты по имени
      files = files.filter(f => f.name !== file.name);
      files.unshift(fileObj);
      saveFiles();
      renderList();
      openFile(0);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }
// OPEN FILE FROM LIST
  function openFile(i) {
    const f = files[i];
    let data = f.data;
    if (!data) {
      data = localStorage.getItem('filedata_' + f.dataKey);
      if (!data) {
        alert('Файл не найден в истории. Откройте его заново.');
        return;
      }
    }
    files[i].data = data;
    showViewer(f.name, data);
  }

  // VIEWER
  function showViewer(name, dataUrl) {
    const ext = getExt(name);
    document.getElementById('viewerTitle').textContent = name;
    document.getElementById('viewerModal').style.display = 'flex';
    const content = document.getElementById('viewerContent');
    content.innerHTML = '<div style="color:var(--text2);text-align:center;padding:40px">Загрузка...</div>';

    if (['jpg','jpeg','png','gif','webp','svg','bmp'].includes(ext)) {
      content.innerHTML = `<img src="${dataUrl}" style="max-width:100%;border-radius:12px;">`;

    } else if (ext === 'txt') {
      fetch(dataUrl).then(r => r.text()).then(text => {
        content.innerHTML = `<pre style="
          white-space:pre-wrap;word-break:break-word;
          font-size:14px;line-height:1.6;color:var(--text);
          font-family:monospace;
        ">${escHtml(text)}</pre>`;
      });

    } else if (ext === 'pdf') {
      const canvas = document.createElement('div');
      content.innerHTML = '';
      content.appendChild(canvas);
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfjsLib.getDocument(dataUrl).promise.then(pdf => {
        canvas.innerHTML = '';
        for (let p = 1; p <= pdf.numPages; p++) {
          pdf.getPage(p).then(page => {
            const scale = window.innerWidth / page.getViewport({scale:1}).width * 0.95;
            const viewport = page.getViewport({scale});
            const c = document.createElement('canvas');
            c.width = viewport.width;
            c.height = viewport.height;
            c.style.cssText = 'display:block;margin:0 auto 12px;border-radius:8px;max-width:100%';
            canvas.appendChild(c);
            page.render({canvasContext: c.getContext('2d'), viewport});
          });
        }
      }).catch(() => {
        content.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки PDF</p>';
      });

    } else if (ext === 'docx') {
      fetch(dataUrl).then(r => r.arrayBuffer()).then(buf => {
        mammoth.convertToHtml({arrayBuffer: buf}).then(result => {
          content.innerHTML = `<div style="
            font-size:15px;line-height:1.7;color:var(--text);
          ">${result.value}</div>`;
        });
      }).catch(() => {
        content.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки DOCX</p>';
      });

    } else if (['xlsx','xls','csv'].includes(ext)) {
      fetch(dataUrl).then(r => r.arrayBuffer()).then(buf => {
        const wb = XLSX.read(buf, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const html = XLSX.utils.sheet_to_html(ws, {editable: false});
        content.innerHTML = `<div style="overflow-x:auto">
          <style>
            table{border-collapse:collapse;width:100%;font-size:13px}
            td,th{border:1px solid var(--surface2);padding:6px 10px;color:var(--text)}
            th{background:var(--surface2);font-weight:600}
            tr:nth-child(even){background:rgba(255,255,255,0.03)}
          </style>
          ${html}
        </div>`;
      }).catch(() => {
        content.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки таблицы</p>';
      });

    } else if (ext === 'pptx') {
      fetch(dataUrl).then(r => r.arrayBuffer()).then(buf => {
        const wb = XLSX.read(buf, {type:'array'});
        content.innerHTML = `<p style="color:var(--text2);padding:20px;text-align:center">
          PPTX: предпросмотр текста недоступен.<br>
          Файл сохранён в истории.
        </p>`;
      }).catch(() => {
        content.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки PPTX</p>';
      });

    } else {
      content.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center">Формат не поддерживается</p>';
    }
  }

  function closeViewer() {
    document.getElementById('viewerModal').style.display = 'none';
    document.getElementById('viewerContent').innerHTML = '';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // INIT
  renderList();
</script>
</body>
</html>
