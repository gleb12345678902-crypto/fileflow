<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FileFlow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body.theme-dark {
      --bg: #0f0f13; --surface: #1a1a24; --surface2: #24243a;
      --accent: #7c6aff; --accent2: #a78bfa;
      --text: #f0f0f5; --text2: #9090aa; --danger: #ff6b6b;
    }
    body.theme-amoled {
      --bg: #000000; --surface: #0a0a0a; --surface2: #141414;
      --accent: #7c6aff; --accent2: #a78bfa;
      --text: #ffffff; --text2: #888888; --danger: #ff6b6b;
    }
    body.theme-light {
      --bg: #f0f0f5; --surface: #ffffff; --surface2: #e5e5ef;
      --accent: #7c6aff; --accent2: #5b4de0;
      --text: #1a1a2e; --text2: #666680; --danger: #e53935;
    }
    body.theme-green {
      --bg: #0a0f0a; --surface: #121a12; --surface2: #1a261a;
      --accent: #4caf50; --accent2: #81c784;
      --text: #e8f5e8; --text2: #7a9a7a; --danger: #ff6b6b;
    }

    :root { --radius: 16px; }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    .header {
      background: var(--surface); padding: 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--surface2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 20px; font-weight: 700; color: var(--accent2); flex: 1; }
    .btn-icon {
      background: var(--surface2); border: none;
      border-radius: 12px; padding: 10px 12px;
      font-size: 18px; cursor: pointer;
    }
    .btn-open {
      background: var(--accent); color: #fff; border: none;
      border-radius: 12px; padding: 10px 18px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-open:active, .btn-icon:active { opacity: 0.7; }

    .search-bar {
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid var(--surface2);
    }
    .search-bar input {
      width: 100%; background: var(--surface2); border: none;
      border-radius: 10px; padding: 10px 14px;
      color: var(--text); font-size: 15px; outline: none;
    }
    .search-bar input::placeholder { color: var(--text2); }

    .tabs {
      display: flex; gap: 8px; padding: 12px 16px;
      overflow-x: auto; background: var(--surface);
      border-bottom: 1px solid var(--surface2);
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      background: var(--surface2); border: none;
      border-radius: 20px; padding: 6px 16px;
      color: var(--text2); font-size: 13px;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: #fff; }

    .file-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60vh; gap: 16px; color: var(--text2); text-align: center;
    }
    .empty-icon { font-size: 64px; }
    .file-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: background 0.15s;
      border: 1px solid transparent;
    }
    .file-card:active { background: var(--surface2); border-color: var(--accent); }
    .file-icon { font-size: 36px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .file-delete {
      background: none; border: none; color: var(--text2);
      font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    .file-delete:active { color: var(--danger); }

    /* VIEWER */
    #viewerModal {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: var(--bg); flex-direction: column;
    }
    #viewerModal.open { display: flex; }
    #viewerHeader {
      background: var(--surface); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--surface2);
      flex-shrink: 0;
    }
    #viewerContent {
      flex: 1; overflow: auto; position: relative;
    }
    #zoomContainer {
      min-height: 100%; padding: 16px;
      transform-origin: top left;
    }

    /* SETTINGS */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200; align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px; width: 100%;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .theme-btn {
      border: 2px solid var(--surface2); border-radius: 14px;
      padding: 16px; cursor: pointer; text-align: center;
      font-size: 14px; font-weight: 600;
      background: var(--surface2); color: var(--text);
      transition: all 0.2s;
    }
    .theme-btn.active { border-color: var(--accent); }
    .theme-preview { width: 100%; height: 40px; border-radius: 8px; margin-bottom: 8px; }
  </style>
</head>
<body class="theme-dark">
<div id="app">
  <div class="header">
    <span class="header-title">📁 FileFlow</span>
    <button class="btn-icon" onclick="openSettings()">⚙️</button>
    <button class="btn-open" onclick="openFilePicker()">+ Открыть</button>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Поиск по названию..." oninput="renderList()">
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all', this)">Все</button>
    <button class="tab" onclick="setTab('pdf', this)">PDF</button>
    <button class="tab" onclick="setTab('doc', this)">Документы</button>
    <button class="tab" onclick="setTab('sheet', this)">Таблицы</button>
    <button class="tab" onclick="setTab('image', this)">Фото</button>
    <button class="tab" onclick="setTab('other', this)">Другое</button>
  </div>

  <div class="file-list" id="fileList"></div>
</div>

<!-- VIEWER -->
<div id="viewerModal">
  <div id="viewerHeader">
    <button onclick="closeViewer()" style="
      background:none; border:none; color:var(--accent2);
      font-size:24px; cursor:pointer; padding:0 8px 0 0;
    ">←</button>
    <span id="viewerTitle" style="
      flex:1; font-size:15px; font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    "></span>
  </div>
  <div id="viewerContent">
    <div id="zoomContainer"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
  <div class="modal-sheet">
    <div class="modal-title">⚙️ Настройки</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px;">Тема интерфейса</div>
    <div class="theme-grid">
      <div class="theme-btn active" id="btn-theme-dark" onclick="setTheme('dark')">
        <div class="theme-preview" style="background:linear-gradient(135deg,#0f0f13,#1a1a24)"></div>
        🌙 Тёмная
      </div>
      <div class="theme-btn" id="btn-theme-amoled" onclick="setTheme('amoled')">
        <div class="theme-preview" style="background:linear-gradient(135deg,#000,#0a0a0a)"></div>
        ⚫ AMOLED
      </div>
      <div class="theme-btn" id="btn-theme-light" onclick="setTheme('light')">
        <div class="theme-preview" style="background:linear-gradient(135deg,#f0f0f5,#fff)"></div>
        ☀️ Светлая
      </div>
      <div class="theme-btn" id="btn-theme-green" onclick="setTheme('green')">
        <div class="theme-preview" style="background:linear-gradient(135deg,#0a0f0a,#1a261a)"></div>
        🌿 Зелёная
      </div>
    </div>
  </div>
</div>

<!-- FILE INPUT -->
<input type="file" id="fileInput" style="display:none"
  accept=".pdf,.txt,.docx,.xlsx,.xls,.csv,.pptx,.jpg,.jpeg,.png,.gif,.webp,.svg,.bmp"
  onchange="handleFileInput(event)">
<script>
  // STATE
  let files = JSON.parse(localStorage.getItem('fileflow_files') || '[]');
  let currentTab = 'all';
  let currentTheme = localStorage.getItem('fileflow_theme') || 'dark';
  let viewerOpen = false;

  // INIT THEME
  applyTheme(currentTheme);

  const categories = {
    pdf: ['pdf'],
    doc: ['txt', 'docx'],
    sheet: ['xlsx', 'xls', 'csv'],
    image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'],
    other: ['pptx']
  };
  const icons = {
    pdf: '📕', txt: '📝', docx: '📄', xlsx: '📊', xls: '📊',
    csv: '📊', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️',
    webp: '🖼️', svg: '🖼️', bmp: '🖼️', pptx: '📊'
  };

  function getExt(name) { return name.split('.').pop().toLowerCase(); }

  function getCategory(name) {
    const ext = getExt(name);
    for (const [cat, exts] of Object.entries(categories)) {
      if (exts.includes(ext)) return cat;
    }
    return 'other';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
    return (bytes / 1024 / 1024).toFixed(1) + ' МБ';
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });
  }

  // THEME
  function applyTheme(theme) {
    currentTheme = theme;
    document.body.className = 'theme-' + theme;
    localStorage.setItem('fileflow_theme', theme);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('btn-theme-' + theme);
    if (btn) btn.classList.add('active');
  }

  function setTheme(theme) { applyTheme(theme); }

  function openSettings() {
    document.getElementById('settingsModal').classList.add('open');
  }
  function closeSettings(e) {
    if (e.target === document.getElementById('settingsModal')) {
      document.getElementById('settingsModal').classList.remove('open');
    }
  }

  // TABS
  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  // RENDER
  function renderList() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const list = document.getElementById('fileList');
    let filtered = files.filter(f => {
      const matchTab = currentTab === 'all' || getCategory(f.name) === currentTab;
      const matchSearch = !query || f.name.toLowerCase().includes(query);
      return matchTab && matchSearch;
    });
    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <p>Файлов пока нет</p>
          <span style="font-size:13px;color:var(--text2)">Нажмите «+ Открыть» чтобы добавить файл</span>
        </div>`;
      return;
    }
    list.innerHTML = filtered.map(f => `
      <div class="file-card" onclick="openFile(${files.indexOf(f)})">
        <div class="file-icon">${icons[getExt(f.name)] || '📄'}</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${formatSize(f.size)} · ${formatDate(f.date)}</div>
        </div>
        <button class="file-delete" onclick="deleteFile(event,${files.indexOf(f)})">🗑</button>
      </div>
    `).join('');
  }

  function saveFiles() {
    const meta = files.map(f => ({
      name: f.name, size: f.size, date: f.date, dataKey: f.dataKey
    }));
    localStorage.setItem('fileflow_files', JSON.stringify(meta));
  }

  function deleteFile(e, i) {
    e.stopPropagation();
    localStorage.removeItem('filedata_' + files[i].dataKey);
    files.splice(i, 1);
    saveFiles();
    renderList();
  }

  function openFilePicker() {
    document.getElementById('fileInput').click();
  }

  function handleFileInput(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataKey = Date.now() + '_' + Math.random().toString(36).slice(2);
      try {
        localStorage.setItem('filedata_' + dataKey, ev.target.result);
      } catch(err) {
        alert('Файл слишком большой. Откроется без сохранения в историю.');
      }
      const fileObj = {
        name: file.name, size: file.size,
        date: Date.now(), dataKey: dataKey,
        data: ev.target.result
      };
      files = files.filter(f => f.name !== file.name);
      files.unshift(fileObj);
      saveFiles();
      renderList();
      openFile(0);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function openFile(i) {
    const f = files[i];
    let data = f.data;
    if (!data) {
      data = localStorage.getItem('filedata_' + f.dataKey);
      if (!data) {
        alert('Файл не найден. Откройте его заново.');
        return;
      }
    }
    files[i].data = data;
    showViewer(f.name, data);
  }
// VIEWER
  function showViewer(name, dataUrl) {
    document.getElementById('viewerTitle').textContent = name;
    document.getElementById('viewerModal').classList.add('open');
    viewerOpen = true;
    history.pushState({viewer: true}, '');

    const container = document.getElementById('zoomContainer');
    container.innerHTML = '<div style="color:var(--text2);text-align:center;padding:40px">Загрузка...</div>';
    container.style.transform = 'scale(1)';
    container.style.transformOrigin = 'top left';
    container.style.width = '100%';

    const ext = getExt(name);

    if (['jpg','jpeg','png','gif','webp','svg','bmp'].includes(ext)) {
      container.innerHTML = `<img src="${dataUrl}" style="max-width:100%;border-radius:12px;display:block;">`;

    } else if (ext === 'txt') {
      fetch(dataUrl).then(r => r.text()).then(text => {
        container.innerHTML = `<pre style="
          white-space:pre-wrap;word-break:break-word;
          font-size:14px;line-height:1.6;color:var(--text);
          font-family:monospace;
        ">${escHtml(text)}</pre>`;
      });

    } else if (ext === 'pdf') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      container.innerHTML = '';
      pdfjsLib.getDocument(dataUrl).promise.then(pdf => {
        for (let p = 1; p <= pdf.numPages; p++) {
          pdf.getPage(p).then(page => {
            const scale = window.innerWidth / page.getViewport({scale:1}).width * 0.95;
            const viewport = page.getViewport({scale});
            const c = document.createElement('canvas');
            c.width = viewport.width;
            c.height = viewport.height;
            c.style.cssText = 'display:block;margin:0 auto 12px;border-radius:8px;max-width:100%';
            container.appendChild(c);
            page.render({canvasContext: c.getContext('2d'), viewport});
          });
        }
      }).catch(() => {
        container.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки PDF</p>';
      });

    } else if (ext === 'docx') {
      fetch(dataUrl).then(r => r.arrayBuffer()).then(buf => {
        mammoth.convertToHtml({arrayBuffer: buf}).then(result => {
          container.innerHTML = `<div style="font-size:15px;line-height:1.7;color:var(--text)">
            ${result.value}</div>`;
        });
      }).catch(() => {
        container.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки DOCX</p>';
      });

    } else if (['xlsx','xls','csv'].includes(ext)) {
      fetch(dataUrl).then(r => r.arrayBuffer()).then(buf => {
        const wb = XLSX.read(buf, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const html = XLSX.utils.sheet_to_html(ws);
        container.innerHTML = `<div style="overflow-x:auto">
          <style>
            table{border-collapse:collapse;width:100%;font-size:13px}
            td,th{border:1px solid var(--surface2);padding:6px 10px;color:var(--text)}
            th{background:var(--surface2);font-weight:600}
            tr:nth-child(even){background:rgba(128,128,128,0.05)}
          </style>${html}</div>`;
      }).catch(() => {
        container.innerHTML = '<p style="color:var(--danger);padding:20px">Ошибка загрузки таблицы</p>';
      });

    } else {
      container.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center">Формат не поддерживается</p>';
    }

    // PINCH TO ZOOM (все форматы)
    initPinchZoom();
  }

  function closeViewer() {
    document.getElementById('viewerModal').classList.remove('open');
    document.getElementById('zoomContainer').innerHTML = '';
    viewerOpen = false;
  }

  // КНОПКА НАЗАД
  window.addEventListener('popstate', function() {
    if (viewerOpen) {
      closeViewer();
    } else {
      history.pushState(null, '');
    }
  });

  // PINCH TO ZOOM — работает для всех форматов через zoomContainer
  function initPinchZoom() {
    const viewer = document.getElementById('viewerContent');
    const container = document.getElementById('zoomContainer');
    let scale = 1, lastScale = 1, startDist = 0;
    let startX = 0, startY = 0, originX = 0, originY = 0;

    viewer.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        originX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        originY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        container.style.transformOrigin = `${originX}px ${originY}px`;
      }
    }, {passive: true});

    viewer.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        scale = Math.min(Math.max(lastScale * (dist / startDist), 0.5), 5);
        container.style.transform = `scale(${scale})`;
      }
    }, {passive: true});

    viewer.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) lastScale = scale;
    }, {passive: true});
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // INIT
  renderList();

  // Не дать приложению закрыться при первом нажатии назад
  history.pushState(null, '');
  window.addEventListener('popstate', function() {
    if (!viewerOpen) history.pushState(null, '');
  });
</script>
</body>
</html>
